name: Sync Asana

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
  repository_dispatch:
    types:
      - bussines-idea-updated
      - idea-source-updated

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tool repo
        uses: actions/checkout@v4

      - name: Checkout idea source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.SOURCE_REPOSITORY || vars.BUSSINES_IDEA_REPOSITORY || 'akina910/bussines_idea' }}
          path: source-bussines-idea
          token: ${{ secrets.SOURCE_REPO_TOKEN || secrets.BUSSINES_IDEA_GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync ideas to Asana
        env:
          ASANA_ACCESS_TOKEN: ${{ secrets.ASANA_ACCESS_TOKEN }}
          ASANA_PROJECT_URL: ${{ secrets.ASANA_PROJECT_URL }}
          # ASANA_SECTION_NAME: set this secret to place all tasks in a single named section (legacy)
          ASANA_SECTION_NAME: ${{ secrets.ASANA_SECTION_NAME }}
          # ASANA_USE_STATUS_SECTIONS:
          # - defaults to true (status-based sections enabled)
          # - set vars/secrets ASANA_USE_STATUS_SECTIONS=false to opt out to legacy single-section mode
          ASANA_USE_STATUS_SECTIONS: ${{ vars.ASANA_USE_STATUS_SECTIONS || secrets.ASANA_USE_STATUS_SECTIONS || 'true' }}
          # ASANA_STATUS_SECTION_MAP_JSON: optional JSON map, e.g. {"手動ローンチ実行待ち":"要対応","分離済み":"完了"}
          ASANA_STATUS_SECTION_MAP_JSON: ${{ vars.ASANA_STATUS_SECTION_MAP_JSON || secrets.ASANA_STATUS_SECTION_MAP_JSON }}
          SOURCE_REPO_PATH: ./source-bussines-idea
          SOURCE_REPO_URL: ${{ vars.SOURCE_REPO_URL || vars.BUSSINES_IDEA_REPO_URL || 'https://github.com/akina910/bussines_idea' }}
        run: node sync-ideas-to-asana.mjs
        # Token rotate reminder: Asana PAT expires 2027-03 (1 year from issue).
        # Rotate before expiry: Settings → Apps → Manage developer apps → Revoke & reissue,
        # then update the ASANA_ACCESS_TOKEN secret in this repo.
